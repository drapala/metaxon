  - source: "Graph-Native Cognitive Memory with Formal Belief Revision (arXiv 2603.17244, mar 2026)"
    why: "Gap 2. Belief revision formal que Graphiti/Zep não tem. URI addressing determinístico. Conecta com safeguards epistêmicos do llm-kb."
  - source: "MAGMA: Multi-Graph based Agentic Memory Architecture (arXiv 2601.03236, jan 2026)"
    why: "Gap 2. Critica organização por proximidade associativa vs. dependência mecanística (causal). Relevante para design do world model."
  - source: "Knowledge-Oriented RAG Survey (arXiv 2503.10677, mar 2025)"
    why: "Gap 3. Cobre index updating: incremental vs. periodic reconstruction. LightRAG e REALM como referências de sistemas dinâmicos."
  - source: "Legal-DC: LegRAG Framework (arXiv 2603.11772, mar 2026)"
    why: "Gap 4. Clause-boundary segmentation + dual auto-reflexão para documentos jurídicos estruturados. Diretamente aplicável a atas PNCP."

ingest_queue_llm_judge:
  - source: "Panickssery et al. (2024) — LLM Evaluators Recognize and Favor Their Own Generations (arXiv:2404.13076, NeurIPS 2024)"
    why: "GPT-4 com 73.5% de self-recognition accuracy + correlação linear entre reconhecimento e força do bias. Evidência concorrente com Wataoka: perplexidade é mecanismo suficiente, não único. Refina self-preference-bias-llm-judge."
  - source: "Stureborg et al. (2024) — LLMs are Inconsistent and Biased Evaluators (arXiv:2405.01724)"
    why: "Confirmação independente de familiarity/perplexidade bias. Diretamente confirma o mecanismo de self-preference distribucional."

